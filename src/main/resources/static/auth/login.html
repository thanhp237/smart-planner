<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartPlanner - Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="sp-login-card sp-card">
    <div class="sp-logo">SmartPlanner</div>
    <p class="sp-auth-subtitle">Quản lý việc học của bạn dễ dàng hơn</p>

    <div class="sp-auth-tabs">
        <button type="button" id="tab-login" class="sp-auth-tab sp-auth-tab-active">Đăng nhập</button>
        <button type="button" id="tab-register" class="sp-auth-tab">Đăng ký</button>
    </div>

    <form id="login-form" class="sp-form sp-auth-form">
        <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
            Mật khẩu
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="sp-button-primary">Đăng nhập</button>
    </form>

    <form id="register-form" class="sp-form sp-auth-form is-hidden">
        <label>
            Họ và tên
            <input type="text" name="fullName" autocomplete="name" required>
        </label>
        <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
            Mật khẩu
            <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <button type="submit" class="sp-button-primary">Tạo tài khoản</button>
    </form>

    <div id="auth-error" class="sp-error-text"></div>
</div>

<script>
    const loginTab = document.getElementById("tab-login");
    const registerTab = document.getElementById("tab-register");
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");
    const errorEl = document.getElementById("auth-error");

    function setActiveTab(tab) {
        if (tab === "login") {
            loginTab.classList.add("sp-auth-tab-active");
            registerTab.classList.remove("sp-auth-tab-active");
            loginForm.classList.remove("is-hidden");
            registerForm.classList.add("is-hidden");
            errorEl.textContent = "";
        } else {
            registerTab.classList.add("sp-auth-tab-active");
            loginTab.classList.remove("sp-auth-tab-active");
            registerForm.classList.remove("is-hidden");
            loginForm.classList.add("is-hidden");
            errorEl.textContent = "";
        }
    }

    loginTab.addEventListener("click", function () {
        setActiveTab("login");
    });

    registerTab.addEventListener("click", function () {
        setActiveTab("register");
    });

    loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorEl.textContent = "";
        const formData = new FormData(loginForm);
        const payload = {
            email: formData.get("email").trim(),
            password: formData.get("password")
        };
        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const text = await res.text();
                try {
                    const json = JSON.parse(text);
                    errorEl.textContent = json.message || "Đăng nhập thất bại";
                } catch (e) {
                    errorEl.textContent = text || "Đăng nhập thất bại";
                }
                return;
            }
            window.location.href = "/";
        } catch (err) {
            errorEl.textContent = "Không thể kết nối đến máy chủ";
        }
    });

    registerForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorEl.textContent = "";
        const formData = new FormData(registerForm);
        const payload = {
            fullName: formData.get("fullName").trim(),
            email: formData.get("email").trim(),
            password: formData.get("password")
        };
        try {
            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const text = await res.text();
                try {
                    const json = JSON.parse(text);
                    if (json.errors) {
                        // Extract first error or join them
                        const msgs = Object.values(json.errors).join(", ");
                        errorEl.textContent = msgs || json.message;
                    } else {
                        errorEl.textContent = json.message || "Đăng ký thất bại";
                    }
                } catch (e) {
                    errorEl.textContent = text || "Đăng ký thất bại";
                }
                return;
            }
            window.location.href = "/";
        } catch (err) {
            errorEl.textContent = "Không thể kết nối đến máy chủ";
        }
    });
</script>
</body>
</html>
